<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body style="background-color: black;">

    <div class="container" style="background-color: black;">
        <div class="card text-center" style="background-color: rgb(26, 53, 10);">

            <div class="card-header" style="background-color: black; color: white;">joguinho da lolo</div>

            <div class="card-body" id="tela" style="background-image: url(assets/bomb.jpg); background-size: cover;">

                <p class="card-text" style="color: white; -webkit-text-stroke: 1px rgba(77, 111, 56, 0.321);">Turno 1</p>

                <div class="row">
                    <div class="col text-middle" id="col-heroi">

                        <ul class="list-group float-start" style="width: 225px;">
                            <li id="nome-heroi" class="list-group-item"
                                style="background-color: rgba(85, 111, 56, 0); color: white;">
                            </li>
                            <li id="titulo-heroi" class="list-group-item"
                                style="background-color: rgba(77, 111, 56, 0); color: white;">
                            </li>
                            <li id="vida-heroi" class="list-group-item"
                                style="background-color: rgba(77, 119, 31, 0);">❤️
                                <progress id="hp-heroi" value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li id="mana-heroi" class="list-group-item"
                                style="background-color: rgba(77, 119, 31, 0);">💙
                                <progress id="mp-heroi" value="100" max="100"></progress>
                            </li>
                            <li id="energia-heroi" class="list-group-item"
                                style="background-color: rgba(77, 119, 31, 0);">💥
                                <progress id="en-heroi" value="0" max="100"
                                    style="accent-color: rgb(25, 224, 25);"></progress>
                            </li>
                        </ul>

                    </div>

                    <div class="col" id="col-boss">

                        <ul class="list-group float-end" style="width: 225px;">
                            <li id="nome-boss" class="list-group-item"
                                style="background-color: rgba(77, 111, 56, 0); color: rgb(255, 255, 255);">
                            </li>
                            <li id="titulo-boss" class="list-group-item"
                                style="background-color: rgba(77, 119, 31, 0); color: white;">
                            </li>
                            <li id="vida-boss" class="list-group-item"
                                style="background-color: rgba(77, 111, 56, 0);">❤️
                                <progress id="hp-boss" value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li id="energia-boss" class="list-group-item"
                                style="background-color: rgba(77, 111, 56, 0);">💥
                                <progress id="en-boss" value="0" max="100"
                                    style="accent-color: rgb(25, 224, 25);"></progress>
                            </li>
                        </ul>

                    </div>
                </div>

                <div class="row">
                    <div class="col text-center" id="col-botoes"> 
                        <div>
                            <img src="assets/finn.gif" width="400" height="400">
                        </div>
                        <div class="btn-group" id="controles">
                            
                        </div>
                    </div>

                    <div class="col text-start" id="col-msg">
                        <img src="assets/lich.png" width="500" height="400">
                    </div>


                </div>
            </div>

            <div class="card-footer" style="background-color:rgb(26, 53, 10)">
                <small class="text-muted" id="log-hero"></small>
                <p></p>
                <small class="text-muted" id="log-boss"></small>
            </div>
            

        </div> <!-- card -->
    </div> <!-- container -->

</body>
<script src="jogo.js"></script>
</html>
